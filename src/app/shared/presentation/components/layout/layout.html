<mat-toolbar>
  <mat-toolbar-row class="toolbar-grid">
    <div class="brand">
      <img src="https://img.logo.dev/enterprise.com?token=pk_B79Ajy8lSxuZc3W2xNN80A" alt="Enterprise" width="32" height="32"/>
      <h1>Enterprise Fleet Manager</h1>
    </div>
    <nav class="nav-center" aria-label="Main navigation">
      @for (option of options; track option.label) {
        <a mat-button [routerLink]="option.link" routerLinkActive="active">{{ option.label | translate }}</a>
      }
    </nav>
    <div class="lang">
      <app-language-switcher/>
    </div>
  </mat-toolbar-row>
</mat-toolbar>
<router-outlet/>
<app-footer-content/>
